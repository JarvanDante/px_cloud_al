server:
  port: 8081

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: px-app-service

dubbo:
  application:
    name: px-app-service
    qos-enable: false
  protocol:
    name: dubbo
    port: 20881
  provider:
    timeout: 3000

auth:
  jwt:
    secret: 656AQn7q+sHwXzO2yiw2r8Ym7wqiKcoaDHw9HorasU0=

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.px_app_service.domain
